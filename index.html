<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دۆزینەوەی سەید سادق - سەرەتا</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --dark-royal: #0B1D2E; 
            --gold-accent: #D4AF37; 
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-light: #F8F9FA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Vazirmatn', sans-serif; background-color: var(--dark-royal); color: var(--text-light); overflow-x: hidden; }

        /* Floating Premium Navbar */
        nav { 
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 1200px; padding: 15px 40px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 1000; border-radius: 50px;
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }
        nav h1 { color: var(--gold-accent); font-size: 24px; font-weight: 900; letter-spacing: 1px;}
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { 
            color: var(--text-light); text-decoration: none; font-weight: 500; font-size: 16px; 
            position: relative; padding: 5px 0; transition: color 0.3s;
        }
        nav ul li a::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 2px;
            background: var(--gold-accent); transition: width 0.4s ease;
        }
        nav ul li a:hover::after, .active-link::after { width: 100%; }
        nav ul li a:hover, .active-link { color: var(--gold-accent); }
        .menu-btn { display: none; color: var(--gold-accent); font-size: 28px; cursor: pointer; z-index: 1001; }

        /* Cinematic Hero Section */
        .hero { position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
        .hero-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: url('saidsadiq-main.jpg') center/cover no-repeat; 
            animation: cinematicZoom 30s infinite alternate linear; z-index: 1; 
        }
        .hero-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, rgba(11, 29, 46, 0.7), rgba(11, 29, 46, 0.95)); z-index: 2; 
        }
        
        .hero-content { position: relative; z-index: 3; padding: 0 20px; display: flex; flex-direction: column; align-items: center;}
        .hero-content h2 { 
            font-size: clamp(3rem, 6vw, 5rem); font-weight: 900; margin-bottom: 10px; 
            background: linear-gradient(45deg, #FFF, var(--gold-accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; animation: fadeUp 1.5s ease forwards 0.5s;
        }
        .hero-content p { 
            font-size: clamp(1.2rem, 2.5vw, 1.8rem); margin-bottom: 40px; color: #ccc;
            opacity: 0; animation: fadeUp 1.5s ease forwards 0.8s; font-weight: 300;
        }
        
        /* Premium Button */
        .btn { 
            position: relative; overflow: hidden; display: inline-block; padding: 16px 45px; 
            background: transparent; color: var(--gold-accent); border: 2px solid var(--gold-accent);
            text-decoration: none; border-radius: 50px; font-weight: 700; font-size: 1.1rem; 
            transition: all 0.4s ease; opacity: 0; animation: fadeUp 1.5s ease forwards 1.1s;
        }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--gold-accent); transition: left 0.4s ease; z-index: -1;
        }
        .btn:hover { color: var(--dark-royal); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3); transform: translateY(-5px);}
        .btn:hover::before { left: 0; }

        /* Animations */
        @keyframes cinematicZoom { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* Static Elegant Footer */
        footer { 
            background-color: #06111A; border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center; padding: 40px 5vw; font-size: 0.95rem; line-height: 2; 
        }
        footer p { color: #888; margin-bottom: 5px; }
        footer .owner { font-weight: 500; color: #aaa; font-size: 0.85rem;}
        footer a { 
            display: inline-flex; align-items: center; gap: 8px; color: #06111A; 
            background-color: var(--gold-accent); padding: 8px 20px; border-radius: 30px; 
            text-decoration: none; font-weight: bold; margin-top: 20px; transition: opacity 0.3s;
        }
        footer a:hover { opacity: 0.8; }

        @media (max-width: 768px) {
            nav { width: 95%; padding: 15px 25px; border-radius: 20px;}
            .menu-btn { display: block; }
            nav ul { 
                position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh; 
                background: rgba(11, 29, 46, 0.98); backdrop-filter: blur(20px);
                flex-direction: column; justify-content: center; transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1); 
            }
            nav ul.active { right: 0; }
            nav ul li a { font-size: 24px; display: block; padding: 15px; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <h1>سەید سادق</h1>
        <div class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars-staggered"></i></div>
        <ul id="nav-links">
            <li><a href="index.html" class="active-link">سەرەتا</a></li>
            <li><a href="history.html">مێژوو</a></li>
            <li><a href="explore.html">گەڕان</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2>سەید سادق</h2>
            <p>دڵی زێڕینی دەشتی شارەزوور</p>
            <a href="explore.html" class="btn">دەست بکە بە گەڕان</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 دۆزینەوەی سەید سادق. بە خۆشەویستییەوە دروستکراوە.</p>
        <p class="owner">خاوەندارێتی: ژیاری دکتۆر فەرەج</p>
        <a href="https://www.facebook.com/share/18TC1wHYRo/?mibextid=wwXIfr" target="_blank"><i class="fa-brands fa-facebook"></i> فەیسبووک</a>
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const navLinks = document.getElementById('nav-links');
        const menuIcon = menuBtn.querySelector('i');
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if(navLinks.classList.contains('active')){ menuIcon.classList.replace('fa-bars-staggered', 'fa-xmark'); } 
            else { menuIcon.classList.replace('fa-xmark', 'fa-bars-staggered'); }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قەزاری سیدسادق - سەرەتا</title>
    
    <!-- فۆنتە نوێیەکە کە بۆ مۆبایل زۆر گونجاوە -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary-color: #2c3e50; --accent-color: #e67e22; --bg-light: #f8f9fa; --text-dark: #333; --text-light: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* دانانی فۆنتەکە بە شێوازێکی پارێزراو بۆ مۆبایل */
        body { font-family: 'Vazirmatn', Tahoma, Arial, sans-serif; background-color: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }

        nav { position: fixed; top: 0; width: 100%; padding: 20px 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        nav h1 { color: var(--text-light); font-size: 24px; font-weight: 800; }
        nav ul { list-style: none; display: flex; gap: 20px; align-items: center; }
        nav ul li a { color: var(--text-light); text-decoration: none; font-weight: 600; font-size: 16px; transition: color 0.3s; }
        nav ul li a:hover { color: var(--accent-color); }
        .active-link { color: var(--accent-color) !important; }
        .menu-btn { display: none; color: var(--text-light); font-size: 28px; cursor: pointer; z-index: 1001; transition: color 0.3s; }

        .hero { position: relative; height: 100vh; min-height: 500px; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; background-color: #2c3e50; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('saidsadiq-main.jpg') center/cover no-repeat; animation: zoomInOut 25s infinite alternate; z-index: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)); z-index: 2; }
        @keyframes zoomInOut { 0% { transform: scale(1); } 100% { transform: scale(1.15); } }
        .hero-content { position: relative; z-index: 3; color: var(--text-light); animation: fadeInUp 2s ease-out; padding: 0 20px; width: 100%; }
        .hero-content h2 { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: 800; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-content p { font-size: clamp(1.2rem, 2.5vw, 1.8rem); margin-bottom: 30px; text-shadow: 1px 1px 5px rgba(0,0,0,0.6); }
        .btn { display: inline-block; padding: 12px 35px; background-color: var(--accent-color); color: var(--text-light); text-decoration: none; border-radius: 30px; font-weight: 600; font-size: 1.1rem; transition: transform 0.3s, box-shadow 0.3s; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        footer { background-color: var(--primary-color); color: var(--text-light); text-align: center; padding: 30px 5vw; font-size: 0.95rem; line-height: 1.8; }
        footer p { margin-bottom: 5px; }
        footer .owner { font-weight: 600; color: #bbb; font-size: 0.85rem;}
        footer a { display: inline-flex; align-items: center; gap: 8px; color: #1877F2; background-color: #fff; padding: 5px 15px; border-radius: 20px; text-decoration: none; font-weight: bold; margin-top: 15px; transition: transform 0.3s; }
        footer a:hover { transform: scale(1.05); }

        @media (max-width: 768px) {
            nav { padding: 15px 5vw; background: rgba(44, 62, 80, 0.98) !important; }
            nav h1 { font-size: 22px; z-index: 1001; }
            .menu-btn { display: block; }
            nav ul { position: fixed; top: 0; right: -100%; width: 100vw; height: 100vh; background-color: rgba(44, 62, 80, 0.98); flex-direction: column; justify-content: center; transition: right 0.4s ease-in-out; }
            nav ul.active { right: 0; }
            nav ul li a { font-size: 22px; display: block; padding: 15px; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <h1>قەزاری سیدسادق</h1>
        <div class="menu-btn" id="menu-btn"><i class="fa-solid fa-bars"></i></div>
        <ul id="nav-links">
            <li><a href="index.html" class="active-link">سەرەتا</a></li>
            <li><a href="history.html">مێژوو</a></li>
            <li><a href="explore.html">گەڕان</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h2>بەخێربێن 
                <br>
                بۆ سەید سادق</h2>
            <p>دڵی دەشتی شارەزوور</p>
            <a href="explore.html" class="btn">دەست بکە بە گەڕان</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 دۆزینەوەی سەید سادق. بە خۆشەویستییەوە دروستکراوە.</p>
        <p class="owner">Ownership: Zhiary Dktor Faraj</p>
        <a href="https://www.facebook.com/share/18TC1wHYRo/?mibextid=wwXIfr" target="_blank"><i class="fa-brands fa-facebook"></i> Facebook</a>
        <!-- hitwebcounter Code START -->
<a href="https://www.hitwebcounter.com/" target="_blank" rel="noopener" title="My Website Stats">
<img src="https://www.hitwebcounter.com/counter/counter.php?page=21497459&amp;style=0004&amp;nbdigits=5&amp;type=page" alt="My Website Stats" decoding="async" style="border:0;max-width:100%;height:auto;" />
</a>
<!-- hitwebcounter Code END -->
    </footer>

    <script>
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('navbar');
            if(window.innerWidth > 768) {
                if (window.scrollY > 50) { nav.style.background = 'rgba(44, 62, 80, 0.95)'; } 
                else { nav.style.background = 'rgba(255, 255, 255, 0.1)'; }
            }
        });

        const menuBtn = document.getElementById('menu-btn');
        const navLinks = document.getElementById('nav-links');
        const menuIcon = menuBtn.querySelector('i');
        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if(navLinks.classList.contains('active')){ menuIcon.classList.replace('fa-bars', 'fa-xmark'); } 
            else { menuIcon.classList.replace('fa-xmark', 'fa-bars'); }
        });
    </script>
</body>
</html>
